name: iOS Unsigned Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.5'

      - name: Install dependencies
        run: |
          flutter pub get
          # 这一步会确保 ios 目录结构完整，并生成基本的 Podfile
          flutter precache --ios

      - name: Patch Xcode and Podfile
        run: |
          # 1. 物理注入一个虚假的 Team ID (7B38P92A8V)
          # 这是绕过 Xcode 15+ "Development Team" 预审的关键
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = 7B38P92A8V;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 2. 强行关闭 Release 环境下的签名校验
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          
          # 3. 如果 Podfile 还没生成，手动触发一次 pod install 以生成它
          # 然后通过脚本强行关闭所有第三方插件（Pods）的签名要求
          cd ios
          pod install || true 
          if [ -f "Podfile" ]; then
            echo "post_install do |installer|
              installer.pods_project.targets.each do |target|
                flutter_additional_ios_build_settings(target)
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                  config.build_settings['DEVELOPMENT_TEAM'] = ''
                end
              end
            end" >> Podfile
            pod install # 重新应用不签名配置
          fi
          cd ..

      - name: Build iOS App Bundle
        run: |
          # 关键：通过 --no-codesign 参数执行构建
          flutter build ios --release --no-codesign

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r WaterApp_Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA
          path: WaterApp_Unsigned.ipa