name: iOS Unsigned Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get
          flutter precache --ios
          cd ios
          for attempt in 1 2 3; do
            pod install && break
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "pod install failed, retrying in 15 seconds..."
            sleep 15
          done

      - name: Prepare project for unsigned iOS build
        run: |
          find ios -name "*.entitlements" -delete

          perl -0pi -e 's/\s*CODE_SIGN_ENTITLEMENTS = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          perl -0pi -e 's/\s*DEVELOPMENT_TEAM = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          perl -0pi -e 's/\s*PROVISIONING_PROFILE_SPECIFIER = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          perl -0pi -e 's/\s*PROVISIONING_PROFILE = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          perl -0pi -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          perl -0pi -e 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "[^"]*";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "";/g' ios/Runner.xcodeproj/project.pbxproj
          perl -0pi -e 's/SystemCapabilities = \{.*?\};/SystemCapabilities = {};/gs' ios/Runner.xcodeproj/project.pbxproj

          cat >> ios/Flutter/Release.xcconfig <<'EOF'
          CODE_SIGN_STYLE=Manual
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=
          EXPANDED_CODE_SIGN_IDENTITY=
          DEVELOPMENT_TEAM=
          PROVISIONING_PROFILE_SPECIFIER=
          PROVISIONING_PROFILE=
          CODE_SIGN_ENTITLEMENTS=
          EOF

      - name: Show selected Xcode
        run: |
          xcodebuild -version

      - name: Build unsigned iOS app with xcodebuild
        env:
          COCOAPODS_PARALLEL_CODE_SIGN: false
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build/ios/DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            EXPANDED_CODE_SIGN_IDENTITY= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            PROVISIONING_PROFILE= \
            CODE_SIGN_ENTITLEMENTS= \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/ios/DerivedData/Build/Products/Release-iphoneos/Runner.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload WaterApp_Unsigned.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA
          path: WaterApp_Unsigned.ipa
