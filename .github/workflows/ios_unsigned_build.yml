name: iOS Unsigned Build

on:
  push:
    branches: [ main ] # 如果你的主分支叫 master，请改为 master
  workflow_dispatch:   # 支持手动点击按钮打包

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # 自动拉取最新的 stable 版本，确保支持 Dart 3.11+
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          # 如果之前编译失败，建议在这里执行一次 clean
          flutter clean
          flutter pub get

      # 🌟 核心补丁：物理欺骗 Xcode 绕过签名校验
      - name: Patch Xcode Project for Unsigned Build
        run: |
          # 1. 注入虚假 Team ID (7B38P92A8V)
          # 这一步是为了满足 Xcode 15+ 对“特权插件”必须有归属的要求
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = 7B38P92A8V;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 2. 强制关闭所有签名和权限清单（Entitlements）的校验
          # 抹除 Entitlements 引用是解决 Siri/蓝牙报错的关键
          sed -i '' 's/CODE_SIGN_ENTITLEMENTS = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;//g' ios/Runner.xcodeproj/project.pbxproj
          
          # 3. 修改 Flutter 配置文件，硬编码不签名标识
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig

      - name: Build iOS App Bundle
        run: |
          # 使用 --no-codesign 跳过物理签名阶段
          flutter build ios --release --no-codesign --build-name=1.0.0 --build-number=1

      - name: Create Unsigned IPA
        run: |
          # 手动将 .app 封装为 .ipa 供下载安装（仅限自签名工具）
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r WaterApp_Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA
          path: WaterApp_Unsigned.ipa