name: iOS Original Test Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # 这里可以先不固定版本，看看最新环境的表现
          
      - name: Install dependencies
        run: |
          flutter pub get
          flutter clean
          flutter pub get

      - name: Build iOS
        run: |
          # 还原最原始的打包命令
          flutter build ios --release --no-codesign